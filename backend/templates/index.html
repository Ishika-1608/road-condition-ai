<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Condition AI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-road"></i> Road Condition Detector</h1>
            <p>Upload an image of a road to analyze its condition using Deep Learning.</p>
        </header>

        <!-- Upload Zone -->
        <div class="upload-zone" id="uploadZone">
            <i class="fas fa-cloud-upload-alt upload-icon"></i>
            <h2>Drag & Drop Image Here</h2>
            <p>or</p>
            <input type="file" id="fileInput" accept="image/*" hidden>
            <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Browse Files</button>
        </div>

        <!-- Preview & Result Section (Hidden by default) -->
        <div class="preview-section" id="previewSection" style="display: none;">
            <div class="image-container">
                <img id="previewImage" src="" alt="Preview">
            </div>
            
            <button class="btn-analyze" id="analyzeBtn">
                <i class="fas fa-brain"></i> Analyze Road
            </button>

            <div class="result-box" id="resultBox" style="display: none;">
                <div class="result-header">Analysis Result</div>
                <div class="result-content">
                    <div class="result-label">Condition:</div>
                    <div class="result-value" id="resultClass">-</div>
                    
                    <div class="result-label">Confidence:</div>
                    <div class="confidence-bar-bg">
                        <div class="confidence-bar-fill" id="confidenceBar"></div>
                    </div>
                    <div class="result-value-small" id="resultConfidence">0%</div>
                </div>

                <!-- Reset Button -->
                <button class="btn-reset" id="resetBtn">
                    <i class="fas fa-redo"></i> Test Another Image
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
